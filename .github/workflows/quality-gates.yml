name: 품질 게이트

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  functions:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: npm ci
        working-directory: functions
      - run: npm test
        working-directory: functions
      - run: npm run test:types
        working-directory: functions
      - run: npm run build
        working-directory: functions
      - run: node -e "require('./lib/index.js')"
        working-directory: functions
      - run: npm run test:runtime-boundaries
        working-directory: functions
      - run: npm install --global firebase-tools
      - run: npm run test:firestore-rules
        working-directory: functions
      - run: npm run test:storage-rules
        working-directory: functions
      - run: npm run test:firebase-integration
        working-directory: functions

  web:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm test -- --runInBand
        working-directory: web
      - run: npm run build
        working-directory: web

  android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
      - uses: android-actions/setup-android@v3
      - run: chmod +x gradlew
        working-directory: android
      - run: ./gradlew testDebugUnitTest assembleDebug --stacktrace
        working-directory: android
